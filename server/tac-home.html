<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prompt World</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7781697026745179" crossorigin="anonymous"></script>
<style>
  :root { --bg:#0b0d10; --panel:#12151b; --line:#2a2f38; --fg:#f2f4f6; --dim:#9aa3ad; --teal:#4dd2c3; --warn:#ffd23e; }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family:'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; }
  a { color:inherit; text-decoration:none; }
  .wrap { max-width:980px; margin:0 auto; padding:0 20px; }
  .up { text-transform:uppercase; letter-spacing:.22em; }

  header { padding:16px 0; border-bottom:1px solid var(--line); }
  header .wrap { display:flex; justify-content:space-between; align-items:center; }
  .brand { font-size:13px; letter-spacing:.3em; }
  .brand b { color:var(--teal); font-weight:normal; }
  nav a { font-size:11px; color:var(--dim); margin-left:18px; letter-spacing:.18em; text-transform:uppercase; }
  nav a:hover { color:var(--fg); }

  .hero { padding:72px 0 56px; text-align:center; position:relative; overflow:hidden;
    background:
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(255,255,255,.025) 39px 40px),
      repeating-linear-gradient(90deg, transparent 0 39px, rgba(255,255,255,.025) 39px 40px); }
  /* slow-pulsing teal glow behind the title — motion without noise */
  .hero::before { content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse 90% 60% at 50% -10%, rgba(77,210,195,.16), transparent);
    animation:heroglow 6s ease-in-out infinite; }
  @keyframes heroglow { 0%,100%{opacity:.6} 50%{opacity:1} }
  .hero > * { position:relative; z-index:1; }
  /* Wordmark: heavy weight, tight tracking, a faint teal glow — reads as a logo,
     not body text, without shipping a font file (keeps CJK fallback intact). */
  h1 { font-size:clamp(26px, 7.4vw, 66px); font-weight:800; letter-spacing:.12em; margin:0 0 14px;
    line-height:1; text-shadow:0 2px 24px rgba(77,210,195,.18); animation:riseIn .7s ease both; }
  h1 b { color:var(--teal); font-weight:800;
    text-shadow:0 0 26px rgba(77,210,195,.45); }
  .tag { color:var(--dim); font-size:clamp(13px,2.4vw,16px); line-height:1.9; margin:0 auto 34px; max-width:640px;
    animation:riseIn .7s ease .08s both; }
  @keyframes riseIn { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
  .cta { display:inline-block; border:1px solid var(--teal); color:var(--teal); padding:15px 44px;
    font-size:13px; letter-spacing:.26em; text-transform:uppercase; margin:6px 8px;
    transition:background .15s, color .15s, transform .15s, box-shadow .15s; animation:riseIn .7s ease .16s both; }
  .cta:hover { background:var(--teal); color:#04110f; transform:translateY(-2px); box-shadow:0 6px 22px rgba(77,210,195,.3); }
  .cta.ghost { border-color:var(--line); color:var(--dim); }
  .cta.ghost:hover { background:var(--panel); color:var(--fg); }
  .keys { margin-top:26px; color:#5f6873; font-size:11px; letter-spacing:.12em; }

  section { padding:54px 0; border-top:1px solid var(--line); }
  h2 { font-size:14px; font-weight:normal; letter-spacing:.3em; text-transform:uppercase; color:var(--teal); margin:0 0 26px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:14px; }
  .card { border:1px solid var(--line); background:var(--panel); padding:14px; display:block; position:relative;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    animation:cardIn .5s ease both; }
  @keyframes cardIn { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
  .card:hover { transform:translateY(-4px); border-color:var(--teal);
    box-shadow:0 10px 30px rgba(0,0,0,.45), 0 0 0 1px rgba(77,210,195,.25); }
  @media (prefers-reduced-motion:reduce){ .hero::before,h1,.tag,.cta,.card{animation:none} }
  .hidebtn { position:absolute; top:8px; right:8px; z-index:2; width:26px; height:26px; line-height:1;
    background:rgba(10,12,14,.7); border:1px solid #2a2f38; color:#9aa3ad; border-radius:50%;
    font-size:15px; cursor:pointer; padding:0; letter-spacing:0; }
  .hidebtn:hover { color:#ff6b6b; border-color:#ff6b6b; }
  .card canvas.thumb { width:100%; height:150px; display:block; background:#0b0d10;
    border:1px solid var(--line); margin-bottom:12px; }
  .card .comp { color:var(--dim); font-size:10px; letter-spacing:.12em; margin-top:6px;
    text-transform:uppercase; line-height:1.9; }
  .card .desc { color:#b9c0c9; font-size:12px; line-height:1.7; margin-top:8px; }
  .card:hover { border-color:var(--teal); }
  .card .nm { font-size:15px; letter-spacing:.08em; margin-bottom:8px; }
  .card .meta { color:var(--dim); font-size:11px; letter-spacing:.1em; }
  .card .play { color:var(--teal); font-size:11px; letter-spacing:.24em; margin-top:14px; text-transform:uppercase; }
  #stageEmpty { color:var(--dim); font-size:13px; }
  .tabbtn { background:#07090c; border:1px solid #2a2f38; color:#9aa3ad; padding:9px 18px; font-size:12px; letter-spacing:.14em; cursor:pointer; }
  .tabbtn.on { color:#f2f4f6; border-color:#4dd2c3; }
  .tbmeta { color:#ffd23e; }
  #refreshBtn { background:#07090c; border:1px solid #2a2f38; color:#9aa3ad; padding:9px 14px; font-size:12px; letter-spacing:.1em; cursor:pointer; margin-left:auto; }
  #refreshBtn:hover { color:#f2f4f6; border-color:#4dd2c3; }
  #refreshBtn.spin { color:#4dd2c3; pointer-events:none; }
  #refreshBtn.spin .ri { display:inline-block; animation:pwspin .8s linear infinite; }
  @keyframes pwspin { to { transform:rotate(360deg); } }
  /* pull-to-refresh drawer that peeks above the grid as you drag down */
  #ptr { height:0; overflow:hidden; text-align:center; color:#4dd2c3; font-size:12px; letter-spacing:.14em; transition:height .18s ease; }
  #ptr.armed { color:#7dffd0; }
  #ptr .ri { display:inline-block; }
  #ptr.spin .ri { animation:pwspin .8s linear infinite; }

  .steps { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:14px; margin-bottom:26px; }
  .step { border:1px solid var(--line); padding:20px; }
  .step .n { color:var(--teal); font-size:22px; margin-bottom:10px; }
  .step .t { font-size:13px; margin-bottom:8px; letter-spacing:.06em; }
  .step p { color:var(--dim); font-size:12px; line-height:1.8; margin:0; }
  code.cmd { display:block; background:#07090c; border:1px solid var(--line); color:var(--teal);
    padding:14px 16px; font-size:12px; overflow-x:auto; white-space:nowrap; font-family:ui-monospace,Menlo,monospace; }
  .hintline { color:var(--dim); font-size:12px; margin-top:12px; line-height:1.8; }

  .units { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:10px; }
  .unit { border:1px solid var(--line); padding:14px; font-size:11px; color:var(--dim); line-height:1.7; }
  .unit b { display:block; color:var(--fg); font-weight:normal; letter-spacing:.14em; margin-bottom:6px; }

  footer { border-top:1px solid var(--line); padding:30px 0 50px; color:#5f6873; font-size:11px; }
  footer .wrap { display:flex; flex-wrap:wrap; gap:18px; justify-content:space-between; }
  footer a { color:var(--dim); letter-spacing:.14em; text-transform:uppercase; }
  footer a:hover { color:var(--fg); }
  /* First-visit onboarding overlay — one-time, says what the game is. */
  #onboard { position:fixed; inset:0; z-index:80; background:rgba(8,10,13,.96); display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px;
    animation:obfade .4s ease both; }
  @keyframes obfade { from{opacity:0} to{opacity:1} }
  #onboard h2 { font-size:clamp(22px,7vw,52px); font-weight:800; letter-spacing:.12em; margin:0 0 28px;
    text-shadow:0 0 26px rgba(77,210,195,.3); }
  #onboard h2 b { color:var(--teal); font-weight:800; }
  #onboard .obl { color:#cfd6de; font-size:clamp(14px,2.6vw,17px); line-height:1.7; max-width:520px;
    margin:10px auto; letter-spacing:.02em; animation:riseIn .6s ease both; }
  #onboard .obl:nth-child(2){animation-delay:.1s} #onboard .obl:nth-child(3){animation-delay:.2s} #onboard .obl:nth-child(4){animation-delay:.3s}
  #onboard .obstart { margin-top:34px; border:1px solid var(--teal); color:var(--teal); background:transparent;
    padding:15px 54px; font-size:14px; letter-spacing:.26em; text-transform:uppercase; cursor:pointer;
    font-family:inherit; transition:background .15s,color .15s,transform .15s; animation:riseIn .6s ease .4s both; }
  #onboard .obstart:hover { background:var(--teal); color:#04110f; transform:translateY(-2px); }
</style>
</head>
<body>
<div id="onboard">
  <h2>PROMPT<b>WORLD</b></h2>
  <div class="obl" data-ob="obL1"></div>
  <div class="obl" data-ob="obL2"></div>
  <div class="obl" data-ob="obL3"></div>
  <button class="obstart" id="obStart" data-ob="obStart"></button>
</div>
<header>
  <div class="wrap">
    <div class="brand up">PROMPT<b>WORLD</b></div>
    <nav>
      <a href="#stages" data-t="navStages"></a>
      <a href="#create" data-t="navCreate"></a>
      <select id="langSel" style="background:#12151b;color:#9aa3ad;border:1px solid #2a2f38;font-size:11px;padding:4px 6px;margin-left:18px;letter-spacing:.1em">
        <option value="en">EN</option><option value="ja">日本語</option><option value="zh">中文</option><option value="es">ES</option><option value="ko">한국어</option>
      </select>
    </nav>
  </div>
</header>

<div class="hero">
  <div class="wrap">
    <h1 class="up">PROMPT<b>WORLD</b></h1>
    <p class="tag" data-t="tag"></p>
    <a class="cta" href="/tac" data-t="play"></a>
    <a class="cta ghost" href="#create" data-t="make"></a>
    <div class="keys" data-t="keys"></div>
  </div>
</div>

<section id="stages">
  <div class="wrap">
    <h2 data-t="secStages"></h2>
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
      <button id="tabMain" class="tabbtn on" type="button"></button>
      <button id="tabTb" class="tabbtn" type="button"></button>
      <button id="refreshBtn" type="button" title="Refresh"><span class="ri">↻</span></button>
    </div>
    <input id="q" data-p="search" style="width:100%;max-width:340px;background:#07090c;border:1px solid #2a2f38;color:#f2f4f6;padding:11px 14px;font-size:13px;margin-bottom:18px;letter-spacing:.06em" />
    <div id="ptr"><span class="ri">↻</span> <span id="ptrTxt"></span></div>
    <div class="grid" id="stageGrid"><span id="stageEmpty" data-t="loading"></span></div>
  </div>
</section>

<section id="create">
  <div class="wrap">
    <h2 data-t="secCreate"></h2>
    <div class="steps">
      <div class="step"><div class="n">01</div><div class="t up" data-t="s1t"></div><p data-t="s1p"></p></div>
      <div class="step"><div class="n">02</div><div class="t up" data-t="s2t"></div><p data-t="s2p"></p></div>
      <div class="step"><div class="n">03</div><div class="t up" data-t="s3t"></div><p data-t="s3p"></p></div>
    </div>
    <code class="cmd">claude mcp add --transport http promptworld https://promptworldgame.org/mcp</code>
    <p class="hintline" data-t="cmdHint"></p>
  </div>
</section>

<section>
  <div class="wrap">
    <h2 data-t="secUnits"></h2>
    <div class="units">
      <div class="unit"><b>SOLDIER</b><span data-t="uSoldier"></span></div>
      <div class="unit"><b>GATLING</b><span data-t="uGatling"></span></div>
      <div class="unit"><b>SNIPER</b><span data-t="uSniper"></span></div>
      <div class="unit"><b>DRONE</b><span data-t="uDrone"></span></div>
      <div class="unit"><b>OPERATOR</b><span data-t="uOperator"></span></div>
      <div class="unit"><b>MINE / BARREL</b><span data-t="uMine"></span></div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span>© PROMPT WORLD</span>
    <span>
      <a href="/mcp-spec.html">MCP GUIDE</a> ·
      <a href="/support">SUPPORT</a> ·
      <a href="/privacy.html">PRIVACY</a> ·
      <a href="/terms.html">TERMS</a>
    </span>
  </div>
</footer>

    var esc = function (t) { var e = document.createElement('span'); e.textContent = t || ''; return e.innerHTML; };
    var TCOL = { soldier: '#7c9a6e', gatling: '#c0564e', sniper: '#a06ec2', drone: '#a6adba', operator: '#c2a05e', shield: '#5e8ac2', bomber: '#d98a3a', apc: '#8f3a36' };
    var TCODE = { soldier: 'SOL', gatling: 'GAT', sniper: 'SNP', drone: 'DRN', operator: 'OPR', shield: 'SHD', bomber: 'BMB', apc: 'APC' };
    function drawThumb(cv, st) {
      var dpr2 = Math.min(window.devicePixelRatio || 1, 2);
      var W = cv.clientWidth * dpr2, H = 150 * dpr2;
      cv.width = W; cv.height = H;
      var c = cv.getContext('2d');
      // subtle vertical sky gradient instead of flat black — reads less "diagram"
      var bg = c.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#141922'); bg.addColorStop(1, '#0b0d10');
      c.fillStyle = bg; c.fillRect(0, 0, W, H);
      var aw = st.arena.w, ad = st.arena.d;
      var m2 = 6 * dpr2;
      var sc2 = Math.min((W - 2 * m2) / aw, (H - 2 * m2) / ad);
      var ox2 = (W - aw * sc2) / 2, oy2 = (H - ad * sc2) / 2;
      var X2 = function (x) { return ox2 + x * sc2; };
      var Z2 = function (z) { return oy2 + (ad - z) * sc2; };
      c.strokeStyle = '#2a2f38'; c.strokeRect(X2(0), Z2(ad), aw * sc2, ad * sc2);
      // Fake-3D extrusion: draw a solid part as a top face plus a shaded
      // "wall" pushed down-right, so structures read as raised blocks, not a map.
      var EX = 3.2 * dpr2; // extrusion depth in px
      function block3d(px, pz, w2, d2, top, side) {
        var x0 = X2(px - w2 / 2), z0 = Z2(pz + d2 / 2), ww = w2 * sc2, hh = d2 * sc2;
        // side wall (extruded down-right)
        c.fillStyle = side;
        c.beginPath();
        c.moveTo(x0, z0 + hh); c.lineTo(x0 + EX, z0 + hh + EX);
        c.lineTo(x0 + ww + EX, z0 + hh + EX); c.lineTo(x0 + ww, z0 + hh);
        c.closePath(); c.fill();
        c.beginPath();
        c.moveTo(x0 + ww, z0); c.lineTo(x0 + ww + EX, z0 + EX);
        c.lineTo(x0 + ww + EX, z0 + hh + EX); c.lineTo(x0 + ww, z0 + hh);
        c.closePath(); c.fill();
        // top face
        c.fillStyle = top;
        c.fillRect(x0, z0, ww, hh);
      }
      (st.parts || []).forEach(function (pt) {
        var w2 = pt.w || 1, d2 = pt.d || 1;
        if (pt.type === 'block') {
          var tp = /^#[0-9a-f]{6}$/i.test(pt.tint || '') ? pt.tint : '#5a6270';
          block3d(pt.x, pt.z, w2, d2, tp, '#3a4150');
        } else if (pt.type === 'pit') {
          c.fillStyle = 'rgba(10,12,15,0.95)';
          c.fillRect(X2(pt.x - w2 / 2), Z2(pt.z + d2 / 2), w2 * sc2, d2 * sc2);
        } else if (pt.type === 'rock' || pt.type === 'wall' || pt.type === 'platform' || pt.type === 'crackedWall') {
          var tp2 = pt.type === 'wall' ? '#454c58' : (pt.type === 'platform' ? '#6f7683' : (pt.type === 'crackedWall' ? '#6e6255' : '#575e6a'));
          block3d(pt.x, pt.z, w2, d2, tp2, '#2f353f');
        } else if (pt.type === 'glass') {
          block3d(pt.x, pt.z, w2, d2, '#9cc8d6', '#5a7f8a');
        } else if (pt.type === 'door') {
          block3d(pt.x, pt.z, w2, d2, '#6b8494', '#3f5460');
        } else if (pt.type === 'slope') {
          block3d(pt.x, pt.z, w2, d2, '#636a76', '#3a4048');
        } else if (pt.type === 'river') {
          c.fillStyle = 'rgba(70,130,200,0.55)';
          c.fillRect(X2(pt.x - w2 / 2), Z2(pt.z + d2 / 2), w2 * sc2, d2 * sc2);
        } else if (pt.type === 'trench') {
          c.fillStyle = 'rgba(15,17,20,0.95)';
          c.fillRect(X2(pt.x - w2 / 2), Z2(pt.z + d2 / 2), w2 * sc2, d2 * sc2);
        } else {
          var dotc = pt.type === 'barrel' ? '#e85a40' : (pt.type === 'mine' ? '#ff4633' :
            (pt.type === 'medkit' ? '#f2f4f6' : (pt.type === 'scope' ? '#59d9f0' :
            (pt.type === 'switch' ? '#7dff9a' : null))));
          if (pt.type === 'jammer') {
            c.strokeStyle = 'rgba(140,100,255,0.7)';
            c.beginPath(); c.arc(X2(pt.x), Z2(pt.z), (pt.r || 12) * sc2, 0, Math.PI * 2); c.stroke();
          } else if (dotc) {
            c.fillStyle = dotc;
            c.beginPath(); c.arc(X2(pt.x), Z2(pt.z), 1.8 * dpr2, 0, Math.PI * 2); c.fill();
          }
        }
      });
      (st.enemies || []).forEach(function (e) {
        var ex = X2(e.x), ez = Z2(e.z), er = 2.8 * dpr2;
        // drop shadow (down-right) for a raised, 3D feel
        c.fillStyle = 'rgba(0,0,0,0.5)';
        c.beginPath(); c.arc(ex + 1.4 * dpr2, ez + 1.4 * dpr2, er, 0, Math.PI * 2); c.fill();
        c.fillStyle = TCOL[e.type] || '#999';
        c.beginPath(); c.arc(ex, ez, er, 0, Math.PI * 2); c.fill();
        // top-left highlight
        c.fillStyle = 'rgba(255,255,255,0.35)';
        c.beginPath(); c.arc(ex - 0.8 * dpr2, ez - 0.8 * dpr2, er * 0.4, 0, Math.PI * 2); c.fill();
      });
      if (st.playerStart) {
        c.fillStyle = '#4dd2c3';
        c.beginPath();
        c.moveTo(X2(st.playerStart.x), Z2(st.playerStart.z) - 4.5 * dpr2);
        c.lineTo(X2(st.playerStart.x) + 3.5 * dpr2, Z2(st.playerStart.z) + 3.5 * dpr2);
        c.lineTo(X2(st.playerStart.x) - 3.5 * dpr2, Z2(st.playerStart.z) + 3.5 * dpr2);
        c.closePath(); c.fill();
      }
    }
    function stageDetails(st) {
      var counts = {};
      (st.enemies || []).forEach(function (e) { counts[e.type] = (counts[e.type] || 0) + 1; });
      var comp = Object.keys(counts).map(function (k) { return (TCODE[k] || k) + '×' + counts[k]; }).join(' · ');
      var mins = Math.round((st.timeLimit || 0) / 60);
      return comp + '<br>' + st.arena.w + '×' + st.arena.d + 'm · ' + mins + 'min · ♥' + (st.lives || 1) +
        ' · ' + (st.ammo ? st.ammo + ' ammo' : '∞ ammo');
    }
    var render = function (list) { grid.innerHTML = list.map(function (s, idx) {
      var meta = (s.attempts || 0) + ' ' + T('plays') + ' · ' + (s.clears || 0) + ' ' + T('clears') +
        (s.creator ? ' · by ' + esc(s.creator) : '');
      var delay = idx < 12 ? (idx * 0.045).toFixed(3) + 's' : '0s'; // staggered entrance for the first row-fills
      return '<a class="card" style="animation-delay:' + delay + '" href="/?stage=' + encodeURIComponent(s.id) + '">' + hideBtn(s.id) +
        '<canvas class="thumb" data-sid="' + esc(s.id) + '"></canvas>' +
        '<div class="nm" data-nid="' + esc(s.id) + '">' + esc(s.name) + '</div>' +
        '<div class="meta">' + meta + '</div>' +
        '<div class="desc" data-did="' + esc(s.id) + '"></div>' +
        '<div class="comp" data-cid="' + esc(s.id) + '">…</div>' +
        '<div class="play up">▶ ' + T('playCard') + '</div></a>';
    }).join('') || ('<span style="color:#9aa3ad;font-size:13px">' + T('empty') + '</span>');
      wireHides(grid);
      // hydrate thumbnails + details from each stage's JSON. Cached per stage
      // (the JSON rarely changes) but the same `force` flag flows through, so a
      // manual refresh re-pulls each card's JSON and picks up a fresh edit.
      list.slice(0, 24).forEach(function (s) {
        fetchCached('/api/stages/' + encodeURIComponent(s.id), 'stage_' + s.id, force).then(function (st) {
          if (!st || !st.arena) return;
          var cv = document.querySelector('canvas.thumb[data-sid="' + s.id + '"]');
          if (cv) {
            // Prefer the angled 3D preview; fall back to the flat map if WebGL
            // is unavailable or the render throws for any reason.
            var drew = false;
            try { drew = Preview3D.ok() && Preview3D.render(st, cv); } catch (e) { drew = false; }
            if (!drew) drawThumb(cv, st);
          }
          var ci = document.querySelector('[data-cid="' + s.id + '"]');
          if (ci) ci.innerHTML = stageDetails(st);
          if (st.nameLoc && st.nameLoc[lang]) {
            var ni = document.querySelector('[data-nid="' + s.id + '"]');
            if (ni) ni.textContent = st.nameLoc[lang];
          }
          if (st.desc && (st.desc[lang] || st.desc.en)) {
            var di = document.querySelector('[data-did="' + s.id + '"]');
            if (di) di.textContent = st.desc[lang] || st.desc.en;
          }
        }).catch(function () { });
      });
    };
    render(d.stages);
    var searchTimer = null;
    document.getElementById('q').oninput = function () {
      if (tbActive) {
        // Testbench search hits the server (the shelf isn't fully loaded client-side).
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadTestbench, 250);
        return;
      }
      var q = this.value.trim().toLowerCase();
      render(!q ? d.stages : d.stages.filter(function (s) { return (s.name || '').toLowerCase().indexOf(q) >= 0; }));
    };
    }).catch(function () { var e = document.getElementById('stageEmpty'); if (e) e.textContent = T('empty'); });
  }

  // ---- refresh controls: button + pull-to-refresh, both force a network hit ----
  var refreshBtn = document.getElementById('refreshBtn');
  var refreshing = false;
  function doRefresh() {
    if (refreshing) return Promise.resolve();
    refreshing = true;
    refreshBtn.classList.add('spin');
    // Always reload MISSIONS from the network; if the user is on the testbench
    // tab, refresh that shelf instead (it's already network-only).
    var p = tbActive ? loadTestbench() : loadMissions(true);
    return Promise.resolve(p).then(function () {}).catch(function () {}).then(function () {
      refreshing = false; refreshBtn.classList.remove('spin');
    });
  }
  refreshBtn.onclick = doRefresh;
  // MISSIONS tab now just refetches the list in place — no full page reload.
  tabMain.onclick = function () {
    document.getElementById('q').value = '';
    loadMissions(false);
  };

  // Pull-to-refresh: only arms at the very top of the page, dragging DOWN. We
  // track a vertical drag and grow the #ptr drawer; releasing past the threshold
  // triggers doRefresh(). Purely additive to native scrolling — if we're not at
  // the top, or the gesture goes up, we never interfere.
  (function () {
    var ptr = document.getElementById('ptr'), ptrTxt = document.getElementById('ptrTxt');
    var startY = 0, pulling = false, dist = 0, THRESH = 64, MAX = 90;
    ptrTxt.textContent = T('ptrPull');
    function atTop() { return (window.scrollY || document.documentElement.scrollTop || 0) <= 0; }
    document.addEventListener('touchstart', function (e) {
      if (!atTop() || refreshing) { pulling = false; return; }
      startY = e.touches[0].clientY; pulling = true; dist = 0;
    }, { passive: true });
    document.addEventListener('touchmove', function (e) {
      if (!pulling) return;
      dist = e.touches[0].clientY - startY;
      if (dist <= 0) { ptr.style.height = '0'; ptr.classList.remove('armed'); return; }
      if (!atTop()) { pulling = false; ptr.style.height = '0'; return; }
      var h = Math.min(dist * 0.5, MAX);
      ptr.style.transition = 'none';
      ptr.style.height = h + 'px';
      if (dist >= THRESH) { ptr.classList.add('armed'); ptrTxt.textContent = T('ptrRelease'); }
      else { ptr.classList.remove('armed'); ptrTxt.textContent = T('ptrPull'); }
    }, { passive: true });
    function endPull() {
      if (!pulling) return;
      pulling = false;
      ptr.style.transition = 'height .18s ease';
      if (dist >= THRESH) {
        ptr.classList.add('spin'); ptrTxt.textContent = T('ptrLoad'); ptr.style.height = '34px';
        doRefresh().then(function () {
          ptr.classList.remove('spin', 'armed'); ptr.style.height = '0'; ptrTxt.textContent = T('ptrPull');
        });
      } else {
        ptr.classList.remove('armed'); ptr.style.height = '0';
      }
      dist = 0;
    }
    document.addEventListener('touchend', endPull, { passive: true });
    document.addEventListener('touchcancel', endPull, { passive: true });
  })();

  loadMissions(false);
})();
</script>
</body>
</html>
