<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PROMPT WORLD — TACTICAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7781697026745179" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d10; overflow:hidden;
    font-family:'Helvetica Neue', Arial, sans-serif; -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; touch-action:none; }
  #gl { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .hud { position:fixed; color:#fff; z-index:10; pointer-events:none;
    text-transform:uppercase; letter-spacing:0.14em; font-size:12px; }
  #topbar { top:calc(10px + env(safe-area-inset-top)); left:14px; right:14px;
    display:flex; justify-content:space-between; align-items:flex-start; }
  #stats { text-align:left; line-height:1.75; font-size:11px; text-shadow:0 1px 2px rgba(0,0,0,.7); }
  #stats b { font-weight:normal; color:#4dd2c3; margin-right:6px; }
  #alertbox { text-align:right; line-height:1.9; text-shadow:0 1px 2px rgba(0,0,0,.7); }
  #alerttxt { color:#ff5a48; display:none; }
  #warntxt { color:#ffd23e; display:none; }
  /* Drone proximity warning: a red arrow that spins around the screen centre to
     point at the nearest approaching enemy drone, so the player notices it (esp.
     one diving from behind) without relying on sound. Pulses faster when nearer. */
  #dronewarn { top:50%; left:50%; width:0; height:0; z-index:10; display:none; }
  #dronewarn .arrow { position:absolute; left:0; top:0; width:0; height:0;
    /* the arrow sits out along -Y (up) from centre; JS rotates the whole thing */
    transform-origin:0 0; }
  #dronewarn .tip { position:absolute; left:-14px; top:-128px; width:0; height:0;
    border-left:14px solid transparent; border-right:14px solid transparent;
    border-bottom:22px solid #ff3b30; filter:drop-shadow(0 0 6px rgba(255,59,48,.7)); }
  #dronewarn .lbl { position:absolute; left:-30px; top:-104px; width:60px; text-align:center;
    color:#ff3b30; font-size:10px; letter-spacing:.12em; text-shadow:0 1px 3px rgba(0,0,0,.8); }
  #dronewarn.pulse { animation:dwpulse .5s steps(2,end) infinite; }
  #dronewarn.pulse-fast { animation:dwpulse .22s steps(2,end) infinite; }
  @keyframes dwpulse { 0%{opacity:1} 50%{opacity:.25} 100%{opacity:1} }
  #crosshair { top:50%; left:50%; width:22px; height:22px; margin:-11px 0 0 -11px; opacity:.9; }
  #crosshair:before, #crosshair:after { content:''; position:absolute; background:#fff; }
  #crosshair:before { left:10px; top:2px; width:2px; height:18px; }
  #crosshair:after { left:2px; top:10px; width:18px; height:2px; }
  #hitmark { top:50%; left:50%; width:26px; height:26px; margin:-13px 0 0 -13px;
    border:2px solid #ffd23e; transform:rotate(45deg); opacity:0; transition:opacity .25s; }
  #overlay { inset:0; box-sizing:border-box; max-width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(6,8,10,.72); pointer-events:auto; text-align:center; padding:20px; overflow-y:auto; }
  #overlay h1 { font-size:clamp(20px,4.5vw,30px); font-weight:normal; letter-spacing:.22em; margin:0 0 10px;
    width:min(720px, calc(100vw - 48px)); overflow-wrap:anywhere; }
  #overlay .eyebrow { color:#4dd2c3; font-size:11px; letter-spacing:.3em; margin-bottom:10px; }
  #overlay .promo { color:#cfd6de; font-size:14px; line-height:2; width:min(560px, calc(100vw - 48px)); margin:2px 0 4px;
    text-transform:none; letter-spacing:.04em; overflow-wrap:anywhere; }
  #overlay .mapwrap { border:1px solid #2a2f38; background:#07090c; padding:8px; margin:16px 0 4px;
    box-shadow:0 0 40px rgba(77,210,195,.06); max-width:calc(100% - 2px); box-sizing:border-box; }
  #overlay .mapwrap canvas { max-width:100%; }
  #overlay .mapwrap canvas { display:block; }
  #overlay .divider { width:56px; height:1px; background:#4dd2c3; opacity:.6; margin:14px auto; }
  #overlay p { color:#9aa3ad; letter-spacing:.1em; line-height:1.9; margin:6px 0; width:min(640px, calc(100vw - 48px));
    text-transform:none; overflow-wrap:anywhere; }
  .btnrow { display:flex; gap:12px; margin-top:22px; flex-wrap:wrap; justify-content:center; }
  .btn { border:1px solid #fff; color:#fff; background:transparent; padding:12px 30px;
    font-size:13px; letter-spacing:.22em; text-transform:uppercase; cursor:pointer;
    font-family:inherit; }
  .btn:active { background:#fff; color:#000; }
  @media (hover:hover) { .btn:hover { background:#fff; color:#000; } }
  /* Rating row on the mission-end screen. A prompt label plus two icon-forward
     buttons so 👍/👎 read clearly and never get lost among RETRY/MENU. */
  #voteRow { margin-top:14px; }
  #voteLabel { color:#9aa3ad; letter-spacing:.18em; font-size:12px; text-transform:uppercase;
    margin:20px 0 0; }
  .vbtn .ico { font-size:20px; line-height:1; display:block; margin-bottom:5px;
    -webkit-text-fill-color:initial; }
  .vbtn { display:flex; flex-direction:column; align-items:center; padding:11px 26px; }
  #bGood { border-color:#3ddc84; color:#3ddc84; }
  #bBad { border-color:#ff6b6b; color:#ff6b6b; }
  #bGood:active, #bBad:active { background:#3ddc84; color:#000; }
  #bBad:active { background:#ff6b6b; }
  @media (hover:hover) {
    #bGood:hover { background:#3ddc84; color:#000; }
    #bBad:hover { background:#ff6b6b; color:#000; }
  }
  #touchui { display:none; }
  .tbtn { position:fixed; border:1px solid rgba(255,255,255,.55); border-radius:50%;
    color:#fff; display:flex; align-items:center; justify-content:center; z-index:11;
    font-size:11px; letter-spacing:.15em; background:rgba(10,12,14,.35); pointer-events:auto; }
  /* Portrait thumb arc. Default = right-hand; body.hand-l mirrors the arc to
     the left edge so a left thumb reaches everything (PAUSE menu toggles it). */
  #btnFire { right:calc(18px + env(safe-area-inset-right)); bottom:calc(38px + env(safe-area-inset-bottom));
    width:84px; height:84px; display:none; }
  #btnJump { right:calc(20px + env(safe-area-inset-right)); bottom:calc(40px + env(safe-area-inset-bottom));
    width:76px; height:76px; }
  #btnBomb { right:calc(112px + env(safe-area-inset-right)); bottom:calc(58px + env(safe-area-inset-bottom));
    width:60px; height:60px; border-color:#ffd23e; color:#ffd23e; }
  #btnScope { right:calc(22px + env(safe-area-inset-right)); bottom:calc(134px + env(safe-area-inset-bottom));
    width:58px; height:58px; display:none; border-color:#59d9f0; color:#59d9f0; font-size:9px; }
  #btnDrone { right:calc(110px + env(safe-area-inset-right)); bottom:calc(144px + env(safe-area-inset-bottom));
    width:60px; height:60px; display:none; border-color:#3ddc84; color:#3ddc84; }
  #btnMap { left:14px; top:calc(150px + env(safe-area-inset-top)); width:48px; height:48px; font-size:9px; }
  #btnPause { left:14px; top:calc(210px + env(safe-area-inset-top)); width:48px; height:48px; font-size:11px; }
  .hand-l #btnFire { right:auto; left:calc(18px + env(safe-area-inset-left)); }
  .hand-l #btnJump { right:auto; left:calc(20px + env(safe-area-inset-left)); }
  .hand-l #btnBomb { right:auto; left:calc(112px + env(safe-area-inset-left)); }
  .hand-l #btnScope { right:auto; left:calc(22px + env(safe-area-inset-left)); }
  .hand-l #btnDrone { right:auto; left:calc(110px + env(safe-area-inset-left)); }
  .hand-l #btnMap { left:auto; right:14px; }
  .hand-l #btnPause { left:auto; right:14px; }
  /* Touch play is portrait-only: in landscape a full-screen prompt asks for a rotate. */
  #rotate { position:fixed; inset:0; z-index:60; background:#0b0d10; color:#fff; display:none;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    letter-spacing:.22em; font-size:14px; text-transform:uppercase; }
  @media (orientation: landscape) { body.is-touch #rotate { display:flex; } }
  #map { position:fixed; inset:0; width:100%; height:100%; z-index:9; display:none; pointer-events:none; }
  #stickBase { position:fixed; width:110px; height:110px; border-radius:50%;
    border:1px solid rgba(255,255,255,.35); z-index:11; display:none; pointer-events:none; }
  #stickKnob { position:fixed; width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,.55); z-index:12; display:none; pointer-events:none;
    margin:-23px 0 0 -23px; }
  #gauges { top:50%; left:50%; margin:-70px 0 0 -30px; width:60px; text-align:center;
    color:#ffd23e; font-size:11px; display:none; }
  #toast { left:50%; bottom:calc(90px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    color:#ffd23e; text-shadow:0 1px 3px rgba(0,0,0,.8); opacity:0; transition:opacity .4s;
    font-size:13px; }
  a { color:#fff; }
  /* Clear-screen celebration: a centered banner + falling confetti, shown on a
     world-first clear (published!) or a world-best time. Sits above the overlay
     but ignores taps so the RETRY/MENU buttons stay usable. */
  #celebrate { position:fixed; inset:0; z-index:40; display:none; pointer-events:none;
    align-items:flex-start; justify-content:center; overflow:hidden; }
  .celebo { margin-top:22vh; text-align:center; animation:celebpop .5s cubic-bezier(.2,1.4,.4,1) both; }
  .celebt { font-size:clamp(22px,6vw,34px); letter-spacing:.14em; color:#ffd23e;
    text-shadow:0 2px 14px rgba(255,210,62,.5); font-weight:bold; }
  .celebs { margin-top:8px; font-size:13px; letter-spacing:.08em; color:#f2f4f6; text-transform:none; }
  @keyframes celebpop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  .confetti { position:absolute; top:-16px; width:9px; height:9px; opacity:.95;
    animation-name:confall; animation-timing-function:linear; animation-fill-mode:forwards; }
  @keyframes confall { 0%{transform:translateY(0) rotate(0)} 100%{transform:translateY(108vh) rotate(540deg);opacity:.4} }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="map"></canvas>
<div class="hud" id="topbar">
  <div id="stats"></div>
  <div id="alertbox"><div id="warntxt"></div><div id="alerttxt"></div></div>
</div>
<div class="hud" id="crosshair" style="display:none"></div>
<div class="hud" id="dronewarn"><div class="arrow"><div class="tip"></div><div class="lbl">DRONE</div></div></div>
<div id="celebrate"></div>
<div class="hud" id="hitmark"></div>
<div class="hud" id="gauges"></div>
<div class="hud" id="toast"></div>
<div id="touchui">
  <div class="tbtn" id="btnFire">FIRE</div>
  <div class="tbtn" id="btnJump">JUMP</div>
  <div class="tbtn" id="btnDrone">DRONE</div>
  <div class="tbtn" id="btnBomb">BOMB</div>
  <div class="tbtn" id="btnMap">MAP</div>
  <div class="tbtn" id="btnPause">❚❚</div>
  <div class="tbtn" id="btnScope">SCOPE</div>
  <div id="stickBase"></div><div id="stickKnob"></div>
</div>
<div class="hud" id="overlay"></div>
<div id="rotate"></div>
<script src="/tacsim.js"></script>
<script src="/tac-client.js"></script>
</body>
</html>
