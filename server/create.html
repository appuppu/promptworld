<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create — Prompt World</title>
<meta property="og:title" content="Create your own world — Prompt World">
<meta property="og:description" content="Build a playable stage by talking to your AI. No tools, no signup — just a prompt.">
<meta property="og:image" content="https://promptworld.pages.dev/og-card.png">
<meta name="twitter:card" content="summary_large_image">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", "Noto Sans CJK", Arial, sans-serif;
         line-height: 1.7; padding: 24px 24px 96px; }
  main { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 40px; letter-spacing: 2px; margin-bottom: 8px; }
  .tagline { opacity: .55; margin-bottom: 44px; }
  h2 { font-size: 15px; letter-spacing: 3px; opacity: .5; margin: 44px 0 12px; }
  p { margin-bottom: 12px; }
  code, pre { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; }
  pre { background: #111; border: 1px solid #333; padding: 14px 16px; overflow-x: auto;
        margin: 12px 0; white-space: pre-wrap; word-break: break-all; }
  .rule { border-left: 3px solid #fff; padding-left: 14px; margin: 10px 0; }
  a { color: #fff; }
  .play { display: inline-block; border: 2px solid #fff; padding: 12px 28px; margin-top: 40px;
          text-decoration: none; letter-spacing: 2px; }
  .play:hover { background: #fff; color: #000; }

  /* language switcher */
  .langbar { display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .langbar button { background: none; border: 1px solid #333; color: #888; padding: 5px 11px;
                    font-size: 12px; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
  .langbar button:hover { color: #fff; border-color: #666; }
  .langbar button.active { color: #000; background: #fff; border-color: #fff; }

  /* living gimmick hero */
  .hero { position: relative; height: 200px; margin: 0 0 44px; border: 1px solid #222; overflow: hidden; }
  .hero * { position: absolute; }
  .ground { left: 0; right: 0; bottom: 24px; height: 10px; background: #fff; }
  .player { width: 26px; height: 26px; background: #fff; bottom: 34px; left: -30px; animation: run 7s linear infinite; }
  @keyframes run { 0%{left:-30px;bottom:34px} 22%{left:20%;bottom:34px} 28%{left:25%;bottom:104px} 34%{left:30%;bottom:34px} 54%{left:52%;bottom:34px} 60%{left:57%;bottom:114px} 66%{left:62%;bottom:34px} 88%{left:86%;bottom:34px} 100%{left:104%;bottom:34px} }
  .faller { width: 44px; height: 44px; background: #fff; left: 24%; top: 8px; animation: slam 3.5s ease-in infinite; }
  .faller::before, .faller::after { content: ""; position: absolute; top: 9px; width: 7px; height: 9px; background: #000; }
  .faller::before { left: 9px; } .faller::after { right: 9px; }
  @keyframes slam { 0%,55%{top:8px} 62%,74%{top:122px} 100%{top:8px} }
  .gate { width: 16px; height: 54px; background: #fff; left: 45%; bottom: 34px; animation: blink 2s steps(1) infinite; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .mover { width: 70px; height: 10px; background: #fff; bottom: 92px; left: 56%; animation: slide 4s ease-in-out infinite alternate; }
  @keyframes slide { from{left:56%} to{left:72%} }
  .key { width: 16px; height: 16px; background: #fff; left: 84%; top: 46px; animation: bob 1.6s ease-in-out infinite alternate; }
  .key::after { content:""; position:absolute; inset:5px; background:#000; }
  @keyframes bob { from{top:46px} to{top:60px} }
  .goal { width: 34px; height: 66px; border: 5px solid #fff; right: 18px; bottom: 34px; }
  .spike { width: 18px; height: 18px; background: #fff; transform: rotate(45deg); bottom: 28px; left: 38%; }
</style>
</head>
<body>
<main>
  <div class="langbar" id="langbar"></div>

  <h1>PROMPT WORLD</h1>
  <p class="tagline" data-i="tagline1"></p>

  <div class="hero" aria-hidden="true">
    <div class="ground"></div><div class="player"></div><div class="faller"></div>
    <div class="spike"></div><div class="gate"></div><div class="mover"></div>
    <div class="key"></div><div class="goal"></div>
  </div>
  <p class="tagline" data-i="tagline2"></p>

  <h2 data-i="step1h"></h2>
  <p data-i="step1a"></p>
  <pre>https://promptworld.pages.dev/mcp</pre>
  <p data-i="step1b"></p>
  <pre>claude mcp add --transport http promptworld https://promptworld.pages.dev/mcp</pre>

  <h2 data-i="step2h"></h2>
  <p data-i="step2a"></p>
  <pre data-i="step2ex"></pre>
  <p data-i="step2b"></p>

  <h2 data-i="step3h"></h2>
  <div class="rule"><strong data-i="ruleLabel"></strong> <span data-i="rule"></span></div>
  <p data-i="step3a"></p>

  <h2 data-i="limitsh"></h2>
  <p data-i="limits"></p>

  <a class="play" href="/" data-i="playnow"></a>
</main>

const LANGS = ['en','ja','zh','es','ko'];

function apply(lang) {
  const dict = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i]').forEach(el => {
    const key = el.getAttribute('data-i');
    if (dict[key] != null) el.textContent = dict[key];
  });
  document.querySelectorAll('#langbar button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));
  try { localStorage.setItem('pw_lang', lang); } catch (e) {}
}

function detectLang() {
  try { const saved = localStorage.getItem('pw_lang'); if (saved && I18N[saved]) return saved; } catch (e) {}
  const nav = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
  const code = nav.toLowerCase().split('-')[0];
  return I18N[code] ? code : 'en';
}

const bar = document.getElementById('langbar');
for (const l of LANGS) {
  const b = document.createElement('button');
  b.textContent = I18N[l]._name;
  b.dataset.lang = l;
  b.onclick = () => apply(l);
  bar.appendChild(b);
}
apply(detectLang());
</script>
</body>
</html>
