<title>Create — Prompt World TACTICAL</title>
<meta property="og:title" content="Create your own arena — Prompt World TACTICAL">
<meta property="og:description" content="Build a playable 3D stealth-shooter stage by talking to any MCP-capable AI. No tools, no signup — just a prompt.">

<style>
  /* Creator guide for the MAIN game (3D tactical stealth shooter) — same design
     tokens as tac.html / tac-home.html: bg #0b0d10, panel #12151b, hairline
     #2a2f38, teal #4dd2c3. The classic 2D guide lives on at /create-classic. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#0b0d10; --panel:#12151b; --line:#2a2f38; --fg:#f2f4f6; --dim:#9aa3ad; --teal:#4dd2c3; }
  body { background: var(--bg); color: var(--fg);
         font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", "Noto Sans CJK", Arial, sans-serif;
         line-height: 1.7; padding: 24px 24px 96px; }
  main { max-width: 640px; margin: 0 auto; }
  h1 { font-size: clamp(26px, 7vw, 40px); letter-spacing: .1em; margin-bottom: 8px; font-weight: 800; }
  h1 b { color: var(--teal); font-weight: 800; }
  .tagline { color: var(--dim); margin-bottom: 36px; }
  h2 { font-size: 14px; letter-spacing: 3px; color: var(--teal); margin: 44px 0 12px; }
  p { margin-bottom: 12px; color: #cfd6de; }
  code, pre { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; }
  pre { background: #07090c; border: 1px solid var(--line); padding: 14px 16px; overflow-x: auto;
        margin: 12px 0; white-space: pre-wrap; word-break: break-all; color: var(--teal); }
  .rule { border-left: 3px solid var(--teal); padding-left: 14px; margin: 10px 0; }
  a { color: var(--fg); }
  .play { display: inline-block; border: 1px solid var(--teal); color: var(--teal); padding: 12px 28px;
          margin-top: 40px; text-decoration: none; letter-spacing: 2px; }
  .play:hover { background: var(--teal); color: #04110f; }

  /* language switcher */
  .langbar { display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .langbar button { background: none; border: 1px solid var(--line); color: #888; padding: 5px 11px;
                    font-size: 12px; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
  .langbar button:hover { color: var(--fg); border-color: #666; }
  .langbar button.active { color: #04110f; background: var(--teal); border-color: var(--teal); }

  /* radar hero: sweeping cone + patrol blips, pure CSS */
  .hero { position: relative; height: 210px; margin: 0 0 44px; border: 1px solid var(--line);
          overflow: hidden; background: radial-gradient(circle at 50% 55%, #10171a 0%, #0b0d10 70%); }
  .hero * { position: absolute; }
  .ring { border: 1px solid rgba(77,210,195,.22); border-radius: 50%; left: 50%; top: 55%;
          transform: translate(-50%,-50%); }
  .r1 { width: 110px; height: 110px; } .r2 { width: 210px; height: 210px; } .r3 { width: 320px; height: 320px; }
  .sweep { left: 50%; top: 55%; width: 170px; height: 170px; margin: -85px 0 0 -85px; border-radius: 50%;
           background: conic-gradient(rgba(77,210,195,.28), transparent 18%);
           animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .blip { width: 8px; height: 8px; border-radius: 50%; }
  .me { background: var(--teal); left: 50%; top: 55%; margin: -4px 0 0 -4px; box-shadow: 0 0 10px var(--teal); }
  .foe { background: #ff5a48; animation: patrol 6s ease-in-out infinite alternate; }
  .f1 { left: 26%; top: 34%; } .f2 { left: 68%; top: 66%; animation-delay: -2s; }
  .f3 { left: 74%; top: 30%; animation-delay: -4s; }
  @keyframes patrol { from { transform: translateX(0); } to { transform: translateX(46px); } }
  .wall { background: #39424d; }
  .w1 { left: 18%; top: 52%; width: 54px; height: 8px; }
  .w2 { left: 60%; top: 44%; width: 8px; height: 42px; }

  /* showcase call-to-action (links to a live published stage) */
  .showcase { display: block; position: relative; text-decoration: none; color: var(--fg);
              border: 1px solid var(--teal); padding: 22px 24px; margin: 8px 0 12px; overflow: hidden;
              background: #0d1216; transition: background .15s, transform .15s; }
  .showcase::before { content: ""; position: absolute; top: 0; bottom: 0; left: -60%; width: 40%;
              background: linear-gradient(100deg, transparent, rgba(77,210,195,.16), transparent);
              animation: sweepx 4.5s linear infinite; pointer-events: none; }
  @keyframes sweepx { 0% { left: -60%; } 60%,100% { left: 130%; } }
  .showcase:hover { background: var(--teal); color: #04110f; transform: translateY(-1px); }
  .showcase:hover::before { display: none; }
  .showcase span { display: block; position: relative; }
  .showcase-eyebrow { font-size: 11px; letter-spacing: 3px; opacity: .6; margin-bottom: 6px; }
  .showcase-title { font-size: 22px; letter-spacing: 1px; font-weight: 700; margin-bottom: 6px; }
  .showcase-sub { font-size: 14px; opacity: .75; line-height: 1.55; margin-bottom: 12px; }
  .showcase-cta { font-size: 13px; letter-spacing: 2px; font-weight: 700; }
</style>
</head>

const LANGS = ['en','ja','zh','es','ko'];

function apply(lang) {
  const dict = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i]').forEach(el => {
    const key = el.getAttribute('data-i');
    if (dict[key] != null) el.textContent = dict[key];
  });
  document.querySelectorAll('#langbar button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));
  try { localStorage.setItem('pw_lang', lang); } catch (e) {}
}

function detectLang() {
  const qs = new URLSearchParams(location.search).get('lang');
  if (qs && I18N[qs]) return qs;
  try { const saved = localStorage.getItem('pw_lang'); if (saved && I18N[saved]) return saved; } catch (e) {}
  const nav = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
  const code = nav.toLowerCase().split('-')[0];
  return I18N[code] ? code : 'en';
}

const bar = document.getElementById('langbar');
for (const l of LANGS) {
  const b = document.createElement('button');
  b.textContent = I18N[l]._name;
  b.dataset.lang = l;
  b.onclick = () => apply(l);
  bar.appendChild(b);
}
apply(detectLang());

</script>
